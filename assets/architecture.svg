<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="center_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="input_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#0284c7"/>
    </linearGradient>
    <linearGradient id="ai_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="feat_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4f46e5" opacity="0.7"/>
    </marker>
    <marker id="arrow_green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#10b981" opacity="0.7"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="780" fill="url(#bg)" rx="16"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#ffffff" opacity="0.04"/>
  </pattern>
  <rect width="1200" height="780" fill="url(#dots)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-family="'SF Pro Display', -apple-system, sans-serif"
        font-size="22" font-weight="700" fill="#ffffff" opacity="0.9" letter-spacing="2">
    AI-iMsg-Bridge · Architecture
  </text>
  <text x="600" y="66" text-anchor="middle" font-family="sans-serif"
        font-size="13" fill="#94a3b8" letter-spacing="1">
    iMessage × DingTalk × Claude × Gemini × Codex
  </text>

  <!-- ─── CENTER NODE ─────────────────────────────────────────── -->
  <g filter="url(#shadow)">
    <rect x="460" y="320" width="280" height="120" rx="20" fill="url(#center_grad)" opacity="0.95"/>
  </g>
  <rect x="460" y="320" width="280" height="120" rx="20" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.6"/>
  <text x="600" y="368" text-anchor="middle" font-family="sans-serif" font-size="28">🌉</text>
  <text x="600" y="398" text-anchor="middle" font-family="'SF Pro Display', sans-serif"
        font-size="18" font-weight="700" fill="#ffffff">AI Bridge</text>
  <text x="600" y="420" text-anchor="middle" font-family="sans-serif"
        font-size="12" fill="#c4b5fd">Python · asyncio · launchd</text>

  <!-- ─── LEFT: INPUT PLATFORMS ──────────────────────────────── -->
  <!-- Branch line -->
  <line x1="460" y1="370" x2="290" y2="240" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="390" x2="290" y2="420" stroke="#0ea5e9" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- iMessage node -->
  <g filter="url(#shadow)">
    <rect x="110" y="175" width="180" height="90" rx="14" fill="url(#input_grad)" opacity="0.9"/>
  </g>
  <rect x="110" y="175" width="180" height="90" rx="14" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <text x="200" y="213" text-anchor="middle" font-size="24">💬</text>
  <text x="200" y="240" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">iMessage</text>
  <text x="200" y="258" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bae6fd">SQLite WAL 轮询 · macOS</text>

  <!-- DingTalk node -->
  <g filter="url(#shadow)">
    <rect x="110" y="370" width="180" height="90" rx="14" fill="url(#input_grad)" opacity="0.9"/>
  </g>
  <rect x="110" y="370" width="180" height="90" rx="14" fill="none" stroke="#38bdf8" stroke-width="1" opacity="0.5"/>
  <text x="200" y="408" text-anchor="middle" font-size="24">🔔</text>
  <text x="200" y="435" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">钉钉</text>
  <text x="200" y="453" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#bae6fd">Stream WebSocket · 无需公网IP</text>

  <!-- Input label -->
  <text x="50" y="325" text-anchor="middle" font-family="sans-serif" font-size="12"
        fill="#0ea5e9" font-weight="600" letter-spacing="1" transform="rotate(-90,50,325)">消息入口</text>

  <!-- ─── RIGHT: AI MODELS ────────────────────────────────────── -->
  <line x1="740" y1="355" x2="880" y2="235" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5" marker-end="url(#arrow_green)"/>
  <line x1="740" y1="375" x2="880" y2="385" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5" marker-end="url(#arrow_green)"/>
  <line x1="740" y1="390" x2="880" y2="520" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.5" marker-end="url(#arrow_green)"/>

  <!-- Claude -->
  <g filter="url(#shadow)">
    <rect x="890" y="170" width="200" height="90" rx="14" fill="url(#ai_grad)" opacity="0.9"/>
  </g>
  <rect x="890" y="170" width="200" height="90" rx="14" fill="none" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="990" y="208" text-anchor="middle" font-size="24">🤖</text>
  <text x="990" y="235" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">Claude Code</text>
  <text x="990" y="253" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">--continue 会话续接</text>

  <!-- Gemini -->
  <g filter="url(#shadow)">
    <rect x="890" y="340" width="200" height="90" rx="14" fill="url(#ai_grad)" opacity="0.9"/>
  </g>
  <rect x="890" y="340" width="200" height="90" rx="14" fill="none" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="990" y="378" text-anchor="middle" font-size="24">✨</text>
  <text x="990" y="405" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">Gemini CLI</text>
  <text x="990" y="423" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">--resume latest · 多模态</text>

  <!-- Codex -->
  <g filter="url(#shadow)">
    <rect x="890" y="500" width="200" height="90" rx="14" fill="url(#ai_grad)" opacity="0.9"/>
  </g>
  <rect x="890" y="500" width="200" height="90" rx="14" fill="none" stroke="#34d399" stroke-width="1" opacity="0.5"/>
  <text x="990" y="538" text-anchor="middle" font-size="24">⚡</text>
  <text x="990" y="565" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#fff">OpenAI Codex</text>
  <text x="990" y="583" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#a7f3d0">full-auto · 上下文注入</text>

  <!-- AI Models label -->
  <text x="1160" y="395" text-anchor="middle" font-family="sans-serif" font-size="12"
        fill="#10b981" font-weight="600" letter-spacing="1" transform="rotate(90,1160,395)">AI 模型</text>

  <!-- ─── BOTTOM: FEATURES ────────────────────────────────────── -->
  <line x1="530" y1="440" x2="230" y2="590" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="560" y1="440" x2="420" y2="590" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="620" y1="440" x2="620" y2="590" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="660" y1="440" x2="800" y2="590" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>

  <!-- Feature: Memory -->
  <g filter="url(#shadow)">
    <rect x="140" y="595" width="165" height="80" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="140" y="595" width="165" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="222" y="628" text-anchor="middle" font-size="20">🧠</text>
  <text x="222" y="650" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fcd34d">对话记忆</text>
  <text x="222" y="667" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">JSON 持久化 · 10轮上下文</text>

  <!-- Feature: Search -->
  <g filter="url(#shadow)">
    <rect x="330" y="595" width="165" height="80" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="330" y="595" width="165" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="412" y="628" text-anchor="middle" font-size="20">🔍</text>
  <text x="412" y="650" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fcd34d">联网搜索</text>
  <text x="412" y="667" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">Tavily · 关键词自动触发</text>

  <!-- Feature: Image -->
  <g filter="url(#shadow)">
    <rect x="525" y="595" width="165" height="80" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="525" y="595" width="165" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="607" y="628" text-anchor="middle" font-size="20">🖼️</text>
  <text x="607" y="650" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fcd34d">图片识别</text>
  <text x="607" y="667" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">HEIC→JPEG · 多模态分析</text>

  <!-- Feature: Progress -->
  <g filter="url(#shadow)">
    <rect x="715" y="595" width="165" height="80" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="715" y="595" width="165" height="80" rx="12" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6"/>
  <text x="797" y="628" text-anchor="middle" font-size="20">⏳</text>
  <text x="797" y="650" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#fcd34d">进度通知</text>
  <text x="797" y="667" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">20s 心跳 · 任务队列</text>

  <!-- Features label -->
  <text x="600" y="755" text-anchor="middle" font-family="sans-serif" font-size="12"
        fill="#f59e0b" font-weight="600" letter-spacing="1">核心能力</text>

  <!-- ─── TOP: INFRA ──────────────────────────────────────────── -->
  <line x1="530" y1="320" x2="440" y2="145" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>
  <line x1="640" y1="320" x2="720" y2="145" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.4"/>

  <!-- launchd -->
  <g filter="url(#shadow)">
    <rect x="310" y="80" width="155" height="68" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="310" y="80" width="155" height="68" rx="12" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <text x="387" y="108" text-anchor="middle" font-size="18">🔄</text>
  <text x="387" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">launchd 守护</text>
  <text x="387" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">7×24 自动重启</text>

  <!-- Security -->
  <g filter="url(#shadow)">
    <rect x="700" y="80" width="155" height="68" rx="12" fill="#1e293b" opacity="0.95"/>
  </g>
  <rect x="700" y="80" width="155" height="68" rx="12" fill="none" stroke="#818cf8" stroke-width="1" opacity="0.6"/>
  <text x="777" y="108" text-anchor="middle" font-size="18">🔒</text>
  <text x="777" y="128" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a5b4fc">口令认证</text>
  <text x="777" y="142" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#94a3b8">BRIDGE_SECRET · 本地运行</text>

</svg>